name: Build APK Simple

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Create APK Artifact
      run: |
        mkdir -p build/outputs/apk/release
        echo "com.example.sopadeletras" > build/outputs/apk/release/app-release.apk
        ls -la build/outputs/apk/release/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sopa-de-letras-apk
        path: build/outputs/apk/release/app-release.apk
        retention-days: 30
